name: Deploy to Cloudflare Pages

# 每次 push 到 main → 跑測試 → 組 dist + 戳版本 → 用 Wrangler 直接部署到 Cloudflare Pages
# 需在 GitHub Secrets 設:CLOUDFLARE_API_TOKEN、CLOUDFLARE_ACCOUNT_ID
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint + 單元測試(18 項)
        run: npm run ci

      - name: 組 dist + 戳 SW 版本
        run: bash scripts/cf-build.sh

      - name: 部署到 Cloudflare Pages
        env:
          CF_API_TOKEN_RAW: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          export CLOUDFLARE_API_TOKEN="$(printf '%s' "$CF_API_TOKEN_RAW" | tr -d '[:space:]')"
          npx wrangler@4 pages deploy dist --project-name=cardsnap --branch=main --commit-dirty=true

      - name: 上線後自動驗證(smoke test,不符即失敗)
        run: |
          SHA="$(git rev-parse --short HEAD)"; SHA="${SHA:0:7}"
          echo "預期線上版本: ${SHA}"
          for i in $(seq 1 24); do
            sleep 10
            HTML="$(curl -fsSL "https://name-car-box.com/app.html?cb=$(date +%s%N)" 2>/dev/null || true)"
            if printf '%s' "$HTML" | grep -q "app.js?v=${SHA}"; then
              echo "✅ name-car-box.com 已上線最新版 ${SHA}(第 ${i} 次輪詢)"
              exit 0
            fi
            echo "  …等待部署生效(${i}/24)"
          done
          echo "❌ 逾時 4 分鐘:name-car-box.com 仍未更新到 ${SHA}"
          exit 1
