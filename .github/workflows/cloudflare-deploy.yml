name: Deploy to Cloudflare Pages

# 每次 push 到 main → 跑測試 → 組 dist + 戳版本 → 用 Wrangler 直接部署到 Cloudflare Pages
# 需在 GitHub Secrets 設:CLOUDFLARE_API_TOKEN、CLOUDFLARE_ACCOUNT_ID
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint + 單元測試(18 項)
        run: npm run ci

      - name: 組 dist + 戳 SW 版本
        run: bash scripts/cf-build.sh

      - name: 部署到 Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@4 pages deploy dist --project-name=cardsnap --branch=main --commit-dirty=true
