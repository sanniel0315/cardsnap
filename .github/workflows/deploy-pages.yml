name: Deploy CardSnap to GitHub Pages

# 推到 main → 先跑測試,通過後才自動部署整站到 GitHub Pages
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # 1) 測試關卡:語法檢查 + 單元測試
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test

  # 2) 部署:必須等 test 成功才會跑
  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.output